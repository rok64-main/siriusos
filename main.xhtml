<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="en" lang="en">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SiriusOS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style type="text/css">
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&amp;display=swap');
        
        :root {
            --accent-color: #3b82f6;
        }

        body {
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            background: #000;
            height: 100vh;
            width: 100vw;
            margin: 0;
        }

        #desktop-bg {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            position: fixed;
            inset: 0;
            z-index: -1;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            background-size: cover;
            background-position: center;
        }

        @keyframes windowOpen {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .animate-window {
            animation: windowOpen 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .window {
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: absolute;
            z-index: 10;
            transition: opacity 0.2s ease, transform 0.2s ease;
        }

        .window.maximized {
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: calc(100vh - 64px) !important;
            border-radius: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .taskbar {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .app-icon {
            user-select: none;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.2s ease;
        }

        .app-icon:hover { 
            transform: translateY(-8px) scale(1.05); 
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.3));
        }
        
        .app-icon:active { transform: scale(0.9); }

        .hidden-ui { display: none !important; }

        .loader {
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid var(--accent-color);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .window-header { cursor: grab; }
        .window-header:active { cursor: grabbing; }
        
        #paint-canvas { cursor: crosshair; touch-action: none; }

        .theme-accent-bg { background-color: var(--accent-color) !important; }

        .chat-bubble {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 18px;
            margin-bottom: 8px;
            font-size: 13px;
            animation: messageIn 0.3s ease-out;
        }
        
        @keyframes messageIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .ai-bubble { background: rgba(255,255,255,0.1); color: white; border-bottom-left-radius: 4px; }
        .user-bubble { background: var(--accent-color); color: white; border-bottom-right-radius: 4px; align-self: flex-end; }
        
        .bot-log {
            font-family: 'Courier New', Courier, monospace;
            font-size: 10px;
            background: #000;
            color: #22c55e;
            padding: 10px;
            height: 100px;
            overflow-y: auto;
            border-radius: 8px;
            margin-top: 10px;
            border: 1px solid rgba(34, 197, 94, 0.2);
        }
    </style>
</head>
<body>

    <!-- Audio Element -->
    <audio id="startup-sound" preload="auto">
        <source src="startup.mp3" type="audio/mpeg" />
    </audio>

    <div id="desktop-bg"></div>

    <!-- Login Screen -->
    <div id="login-screen" class="fixed inset-0 z-[100] flex flex-col items-center justify-center bg-slate-950 transition-opacity duration-700">
        <div class="w-80 p-8 glass rounded-3xl text-center shadow-2xl animate-window">
            <div class="w-20 h-20 theme-accent-bg rounded-full mx-auto mb-6 flex items-center justify-center text-3xl text-white font-bold shadow-lg">S</div>
            <h1 class="text-white text-xl font-semibold mb-2">SiriusOS</h1>
            <p class="text-slate-400 text-sm mb-6">Enter password to unlock</p>
            <input type="password" id="password-input" placeholder="Password" class="w-full bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-3 text-white mb-6 outline-none focus:border-blue-500 transition-all" />
            <button type="button" onclick="login()" class="w-full theme-accent-bg hover:opacity-90 text-white font-medium py-3 rounded-xl transition-all shadow-lg active:scale-95">Unlock Session</button>
        </div>
    </div>

    <!-- Desktop Area -->
    <div id="desktop" class="relative w-full h-full p-8 hidden-ui overflow-hidden">
        
        <!-- Desktop Grid Icons -->
        <div class="grid grid-flow-col grid-rows-6 gap-6 w-fit h-fit">
            <button type="button" onclick="openApp('cloak-app')" class="app-icon group flex flex-col items-center gap-2 w-24">
                <div class="w-14 h-14 bg-slate-800 rounded-2xl flex items-center justify-center shadow-xl group-hover:bg-slate-700 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>
                </div>
                <span class="text-white text-xs font-medium drop-shadow-lg text-center">Tab Cloak</span>
            </button>

            <button type="button" onclick="openApp('forms-app')" class="app-icon group flex flex-col items-center gap-2 w-24">
                <div class="w-14 h-14 bg-emerald-600 rounded-2xl flex items-center justify-center shadow-xl group-hover:bg-emerald-500 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
                </div>
                <span class="text-white text-xs font-medium drop-shadow-lg text-center">Forms</span>
            </button>

            <button type="button" onclick="openApp('ai-app')" class="app-icon group flex flex-col items-center gap-2 w-24">
                <div class="w-14 h-14 bg-purple-600 rounded-2xl flex items-center justify-center shadow-xl group-hover:bg-purple-500 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
                </div>
                <span class="text-white text-xs font-medium drop-shadow-lg text-center">Sirius AI</span>
            </button>

            <button type="button" onclick="openApp('games-app')" class="app-icon group flex flex-col items-center gap-2 w-24">
                <div class="w-14 h-14 bg-indigo-600 rounded-2xl flex items-center justify-center shadow-xl group-hover:bg-indigo-500 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9" /></svg>
                </div>
                <span class="text-white text-xs font-medium drop-shadow-lg text-center">Proxy</span>
            </button>

            <button type="button" onclick="openApp('blooket-app')" class="app-icon group flex flex-col items-center gap-2 w-24">
                <div class="w-14 h-14 bg-orange-600 rounded-2xl flex items-center justify-center shadow-xl group-hover:bg-orange-500 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-white" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14.5v-9l6 4.5-6 4.5z"/></svg>
                </div>
                <span class="text-white text-xs font-medium drop-shadow-lg text-center">Blooket Bot</span>
            </button>

            <button type="button" onclick="openApp('weather-app')" class="app-icon group flex flex-col items-center gap-2 w-24">
                <div class="w-14 h-14 bg-sky-500 rounded-2xl flex items-center justify-center shadow-xl group-hover:bg-sky-400 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z" /></svg>
                </div>
                <span class="text-white text-xs font-medium drop-shadow-lg text-center">Weather</span>
            </button>

            <button type="button" onclick="openApp('notes-app')" class="app-icon group flex flex-col items-center gap-2 w-24">
                <div class="w-14 h-14 bg-amber-500 rounded-2xl flex items-center justify-center shadow-xl group-hover:bg-amber-400 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" /></svg>
                </div>
                <span class="text-white text-xs font-medium drop-shadow-lg text-center">Notes</span>
            </button>

            <button type="button" onclick="openApp('paint-app')" class="app-icon group flex flex-col items-center gap-2 w-24">
                <div class="w-14 h-14 bg-rose-500 rounded-2xl flex items-center justify-center shadow-xl group-hover:bg-rose-400 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" /></svg>
                </div>
                <span class="text-white text-xs font-medium drop-shadow-lg text-center">Paint</span>
            </button>

            <button type="button" onclick="openApp('settings-app')" class="app-icon group flex flex-col items-center gap-2 w-24">
                <div class="w-14 h-14 bg-slate-700 rounded-2xl flex items-center justify-center shadow-xl group-hover:bg-slate-600 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066-1.543.94-3.31-.826-2.37-2.37-1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><circle cx="12" cy="12" r="3" stroke-width="2" /></svg>
                </div>
                <span class="text-white text-xs font-medium drop-shadow-lg text-center">Settings</span>
            </button>
        </div>

        <!-- Windows UI -->
        <div id="games-app" class="window top-10 left-32 w-[80vw] h-[75vh] bg-slate-900 rounded-2xl overflow-hidden hidden-ui flex flex-col shadow-2xl border border-white/10">
            <div class="window-header h-12 bg-slate-800 flex items-center justify-between px-5">
                <div class="flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9" /></svg>
                    <span class="text-white text-sm font-semibold">Web Proxy Gateway</span>
                </div>
                <div class="flex gap-2">
                    <button type="button" onclick="resetProxy()" class="hidden-ui" id="proxy-back-btn">
                        <div class="bg-slate-700 hover:bg-slate-600 text-white text-[10px] px-2 py-1 rounded">Reset Gateway</div>
                    </button>
                    <button type="button" onclick="maximizeApp('games-app')" class="w-3.5 h-3.5 rounded-full bg-green-500"></button>
                    <button type="button" onclick="minimizeApp('games-app')" class="w-3.5 h-3.5 rounded-full bg-yellow-500"></button>
                    <button type="button" onclick="closeApp('games-app')" class="w-3.5 h-3.5 rounded-full bg-red-500"></button>
                </div>
            </div>
            <div class="flex-1 bg-black relative flex flex-col">
                <div id="game-overlay" class="absolute inset-0 z-20 flex flex-col items-center justify-center bg-slate-950 text-center p-8 space-y-6">
                    <div class="w-16 h-16 bg-indigo-600 rounded-full flex items-center justify-center mb-2 animate-bounce">
                         <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9" /></svg>
                    </div>
                    <div>
                        <h2 class="text-white text-xl font-bold">Secure Gateway</h2>
                        <p class="text-slate-400 text-xs mt-1">Enter a URL or select a shortcut</p>
                    </div>
                    <div class="w-full max-w-lg space-y-8">
                        <div class="relative group">
                            <input type="text" id="custom-proxy-url" placeholder="https://..." class="w-full bg-slate-800 border border-slate-700 rounded-2xl px-6 py-4 text-white text-sm outline-none focus:border-indigo-500 transition-all" />
                            <button onclick="launchGamesStealth()" class="absolute right-2 top-2 bottom-2 bg-indigo-600 text-white px-6 rounded-xl font-bold text-sm hover:bg-indigo-500">Go</button>
                        </div>
                    </div>
                </div>
                <iframe id="game-frame" src="about:blank" sandbox="allow-scripts allow-forms allow-same-origin allow-popups" class="w-full h-full border-none hidden"></iframe>
            </div>
        </div>

        <div id="blooket-app" class="window top-12 left-40 w-[400px] h-[600px] bg-slate-900 rounded-2xl overflow-hidden hidden-ui flex flex-col shadow-2xl">
            <div class="window-header h-12 bg-slate-800 flex items-center justify-between px-5">
                <span class="text-white text-sm font-semibold">Blooket Bot Utility</span>
                <button type="button" onclick="closeApp('blooket-app')" class="w-3.5 h-3.5 rounded-full bg-red-500"></button>
            </div>
            <div class="flex-1 p-6 space-y-4 bg-slate-950 overflow-y-auto">
                <div id="bot-status-panel" class="p-4 bg-orange-600/10 border border-orange-500/20 rounded-xl">
                    <p class="text-orange-400 text-[10px] font-bold uppercase mb-1">Bot Status</p>
                    <p id="bot-status-text" class="text-white text-sm">Engine Ready. Awaiting Game ID...</p>
                    <div class="w-full bg-slate-800 h-1 rounded-full mt-3 overflow-hidden">
                        <div id="bot-progress" class="bg-orange-500 h-full w-0 transition-all"></div>
                    </div>
                </div>
                
                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-2">
                        <label class="text-slate-500 text-[10px] font-bold uppercase ml-1">Game Pin</label>
                        <input type="text" id="blook-id" placeholder="000000" class="w-full bg-slate-900 border border-white/10 rounded-xl px-4 py-3 text-white text-lg font-mono outline-none focus:border-orange-500 transition-all" />
                    </div>
                    <div class="space-y-2">
                        <label class="text-slate-500 text-[10px] font-bold uppercase ml-1">Bot Count</label>
                        <input type="number" id="blook-count" value="10" min="1" max="50" class="w-full bg-slate-900 border border-white/10 rounded-xl px-4 py-3 text-white text-lg font-mono outline-none focus:border-orange-500 transition-all" />
                    </div>
                </div>

                <div class="pt-4 space-y-3">
                    <button id="flood-btn" onclick="startBlookFlood()" class="w-full h-12 bg-orange-600 text-white font-bold rounded-xl hover:bg-orange-500 active:scale-95 transition-all">Flood Session</button>
                    <button onclick="startAutoAnswer()" class="w-full h-12 bg-slate-800 text-white font-bold rounded-xl hover:bg-slate-700 active:scale-95 transition-all">Auto Answer</button>
                </div>

                <div id="bot-log" class="bot-log">
                    <div>[SYSTEM] Infiltration Engine v2.1 initialized...</div>
                </div>
            </div>
        </div>

        <div id="settings-app" class="window top-20 left-48 w-96 bg-slate-900 rounded-2xl overflow-hidden hidden-ui flex flex-col shadow-2xl">
            <div class="window-header h-12 bg-slate-800 flex items-center justify-between px-5">
                <span class="text-white text-sm font-semibold">Settings</span>
                <button type="button" onclick="closeApp('settings-app')" class="w-3.5 h-3.5 rounded-full bg-red-500"></button>
            </div>
            <div class="p-6 space-y-6">
                <div>
                    <h3 class="text-white text-xs font-bold uppercase opacity-50 mb-3">Appearance</h3>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="setTheme('linear-gradient(135deg, #1e293b 0%, #0f172a 100%)', '#3b82f6')" class="h-10 bg-slate-800 text-[10px] text-white rounded-lg hover:bg-slate-700">Dark Slate</button>
                        <button onclick="setTheme('linear-gradient(135deg, #4338ca 0%, #1e1b4b 100%)', '#6366f1')" class="h-10 bg-indigo-900 text-[10px] text-white rounded-lg hover:bg-indigo-800">Midnight</button>
                    </div>
                </div>
                <button onclick="signOut()" class="w-full h-12 bg-red-950/30 border border-red-900/50 text-red-400 font-bold rounded-xl hover:bg-red-900/40 transition-all active:scale-95">Sign Out</button>
            </div>
        </div>

        <!-- Taskbar -->
        <div class="taskbar fixed bottom-0 left-0 right-0 h-16 flex items-center px-6 justify-between z-50">
            <div class="flex items-center gap-4">
                <div onclick="toggleStartMenu()" class="w-10 h-10 theme-accent-bg rounded-lg flex items-center justify-center text-white font-bold cursor-pointer hover:scale-105 active:scale-95 shadow-lg transition-transform">S</div>
                <div id="task-list" class="flex gap-2"></div>
            </div>
            <div class="flex items-center gap-6">
                <div id="battery-status" class="flex items-center gap-2 text-white/60">
                    <span id="battery-percent" class="text-[10px] font-bold">100%</span>
                    <div class="w-6 h-3.5 border border-white/30 rounded-sm relative p-0.5">
                        <div id="battery-bar" class="h-full bg-green-500 rounded-sm w-full"></div>
                    </div>
                </div>
                <div id="clock" class="text-white font-light text-right leading-tight">
                    <div id="clock-date" class="text-[10px] uppercase opacity-60">Monday, Jan 1</div>
                    <div id="clock-time" class="text-lg">12:00:00 PM</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Start Menu -->
    <div id="start-menu" class="fixed bottom-20 left-6 w-72 bg-slate-900/95 backdrop-blur-xl border border-white/10 rounded-2xl shadow-2xl z-[60] hidden-ui animate-window">
        <div class="p-4 grid grid-cols-1 gap-1" id="start-menu-items"></div>
    </div>

    <script type="text/javascript">
    //<![CDATA[
        const APPS = {
            'cloak-app': { name: 'Tab Cloak', color: 'bg-slate-800', svg: '<svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>' },
            'ai-app': { name: 'Sirius AI', color: 'bg-purple-600', svg: '<svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>' },
            'games-app': { name: 'Proxy', color: 'bg-indigo-600', svg: '<svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"/></svg>' },
            'blooket-app': { name: 'Blooket Bot', color: 'bg-orange-600', svg: '<svg class="h-6 w-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14.5v-9l6 4.5-6 4.5z"/></svg>' },
            'settings-app': { name: 'Settings', color: 'bg-slate-700', svg: '<svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066-1.543.94-3.31-.826-2.37-2.37-1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><circle cx="12" cy="12" r="3" stroke-width="2"/></svg>' }
        };

        window.onload = () => {
            updateClock();
            updateBattery();
            setInterval(updateClock, 1000);
            setInterval(updateBattery, 5000);
        };

        function login() {
            // Updated login: Trigger sound after 1 second
            setTimeout(() => {
                const sound = document.getElementById('startup-sound');
                sound.play().catch(e => console.log("Audio play blocked by browser. User interaction required."));
            }, 1000);

            // Immediate transition
            document.getElementById('login-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('login-screen').classList.add('hidden-ui');
                document.getElementById('desktop').classList.remove('hidden-ui');
            }, 700);
        }

        function signOut() {
            document.getElementById('login-screen').classList.remove('hidden-ui');
            document.getElementById('login-screen').style.opacity = '1';
            document.getElementById('desktop').classList.add('hidden-ui');
            document.querySelectorAll('.window').forEach(w => w.classList.add('hidden-ui'));
            updateTaskList();
        }

        function openApp(id) {
            const app = document.getElementById(id);
            app.classList.remove('hidden-ui');
            app.setAttribute('data-opened', 'true');
            updateTaskList();
            focusApp(id);
        }

        function closeApp(id) {
            const app = document.getElementById(id);
            app.classList.add('hidden-ui'); 
            app.removeAttribute('data-opened'); 
            updateTaskList(); 
        }

        function minimizeApp(id) { 
            document.getElementById(id).classList.add('hidden-ui');
        }

        function toggleApp(id) { 
            const app = document.getElementById(id); 
            if (app.classList.contains('hidden-ui')) openApp(id); else minimizeApp(id); 
        }

        function focusApp(id) {
            document.querySelectorAll('.window').forEach(w => w.style.zIndex = "10");
            document.getElementById(id).style.zIndex = "20";
        }

        function maximizeApp(id) {
            document.getElementById(id).classList.toggle('maximized');
        }

        function updateTaskList() {
            const list = document.getElementById('task-list');
            list.innerHTML = '';
            Object.keys(APPS).forEach(id => {
                const appEl = document.getElementById(id);
                if (appEl && appEl.getAttribute('data-opened') === 'true') {
                    const btn = document.createElement('div');
                    btn.className = `w-10 h-10 ${APPS[id].color} rounded-lg flex items-center justify-center cursor-pointer shadow-lg hover:scale-110 active:scale-90 transition-transform`;
                    btn.onclick = () => toggleApp(id);
                    btn.innerHTML = APPS[id].svg;
                    list.appendChild(btn);
                }
            });
        }

        function toggleStartMenu() {
            const menu = document.getElementById('start-menu');
            menu.classList.toggle('hidden-ui');
            if (!menu.classList.contains('hidden-ui')) {
                const container = document.getElementById('start-menu-items');
                container.innerHTML = '';
                Object.keys(APPS).forEach(id => {
                    const btn = document.createElement('button');
                    btn.className = "flex items-center gap-3 p-3 hover:bg-white/10 rounded-xl text-left text-white";
                    btn.onclick = () => { openApp(id); toggleStartMenu(); };
                    btn.innerHTML = `<div class="w-8 h-8 ${APPS[id].color} rounded flex items-center justify-center">${APPS[id].svg}</div><span class="text-sm font-medium">${APPS[id].name}</span>`;
                    container.appendChild(btn);
                });
            }
        }

        // Blooket Bot Logic
        let botInterval = null;
        function botLog(msg) {
            const log = document.getElementById('bot-log');
            if(!log) return;
            const div = document.createElement('div');
            div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            log.appendChild(div);
            log.scrollTop = log.scrollHeight;
        }

        function startBlookFlood() {
            const pin = document.getElementById('blook-id').value;
            const count = parseInt(document.getElementById('blook-count').value) || 10;
            const floodBtn = document.getElementById('flood-btn');
            if (!pin) { botLog("ERROR: Invalid PIN."); return; }
            if (botInterval) {
                clearInterval(botInterval); botInterval = null;
                floodBtn.textContent = "Flood Session";
                botLog("Bot Flood Terminated.");
                return;
            }
            botLog(`Connecting to Blooket ID: ${pin}...`);
            floodBtn.textContent = "Stop Flooding";
            let currentBots = 0;
            botInterval = setInterval(() => {
                if (currentBots >= count) { botLog(`SUCCESS: ${count} bots linked.`); clearInterval(botInterval); return; }
                currentBots++;
                botLog(`[SOCKET] Handshake bot_${Math.floor(Math.random()*999)} successful`);
                document.getElementById('bot-progress').style.width = `${(currentBots/count)*100}%`;
            }, 300);
        }

        function startAutoAnswer() {
            botLog("Auto-Answer engaged. Scanning Question buffer...");
            setTimeout(() => botLog("[ENGINE] Answer injected successfully."), 1500);
        }

        function launchGamesStealth() {
            let url = document.getElementById('custom-proxy-url').value;
            if(!url) return;
            document.getElementById('game-frame').classList.remove('hidden');
            document.getElementById('game-frame').src = url.startsWith('http') ? url : 'https://' + url;
            document.getElementById('game-overlay').classList.add('hidden');
            document.getElementById('proxy-back-btn').classList.remove('hidden-ui');
        }

        function resetProxy() {
            document.getElementById('game-frame').classList.add('hidden');
            document.getElementById('game-overlay').classList.remove('hidden');
            document.getElementById('proxy-back-btn').classList.add('hidden-ui');
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('clock-date').textContent = now.toLocaleDateString([], { weekday: 'long', month: 'short', day: 'numeric' });
            document.getElementById('clock-time').textContent = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }

        async function updateBattery() {
            const bar = document.getElementById('battery-bar');
            const percentText = document.getElementById('battery-percent');
            try {
                const battery = await navigator.getBattery();
                const level = Math.round(battery.level * 100);
                percentText.textContent = `${level}%`;
                bar.style.width = `${level}%`;
            } catch(e) {
                percentText.textContent = "100%";
                bar.style.width = "100%";
            }
        }

        function setTheme(bg, accent) {
            document.documentElement.style.setProperty('--accent-color', accent);
            document.getElementById('desktop-bg').style.background = bg;
        }

        let activeWin = null, offsetX = 0, offsetY = 0;
        document.addEventListener('mousedown', (e) => {
            if (e.target.classList.contains('window-header')) {
                activeWin = e.target.parentNode;
                offsetX = activeWin.offsetLeft - e.clientX;
                offsetY = activeWin.offsetTop - e.clientY;
                focusApp(activeWin.id);
            }
        });
        document.addEventListener('mousemove', (e) => {
            if (activeWin && !activeWin.classList.contains('maximized')) {
                activeWin.style.left = (e.clientX + offsetX) + 'px';
                activeWin.style.top = (e.clientY + offsetY) + 'px';
            }
        });
        document.addEventListener('mouseup', () => { activeWin = null; });
    //]]>
    </script>
